esphome:
  name: sourdough-lid
  friendly_name: Sourdough Lid

esp32:
  board: m5stack-coreink
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
logger:
ota:
  platform: esphome

# ─── State tracking ──────────────────────────────────────────
globals:
  - id: baseline_distance
    type: float
    restore_value: yes
    initial_value: '0'
  - id: prev_distance
    type: float
    restore_value: no
    initial_value: '-1'
  - id: min_distance
    type: float
    restore_value: yes
    initial_value: '9999'
  - id: peak_notified
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'

# ─── Configuration ───────────────────────────────────────────
number:
  - platform: template
    name: "Jar Depth"
    id: jar_depth
    unit_of_measurement: "mm"
    min_value: 50
    max_value: 200
    step: 1
    initial_value: 110
    restore_value: true
    optimistic: true
    entity_category: config
    icon: "mdi:cup-outline"

# ─── Bus ─────────────────────────────────────────────────────
i2c:
  sda: GPIO32
  scl: GPIO33
  scan: true

# ─── Sensors ─────────────────────────────────────────────────
sensor:
  # ENV III — SHT30: temperature + humidity
  - platform: sht3xd
    address: 0x44
    update_interval: 60s
    temperature:
      name: "Sourdough Temperature"
      id: sourdough_temp
    humidity:
      name: "Sourdough Humidity"
      id: sourdough_hum

  # ENV III — QMP6988: barometric pressure
  - platform: qmp6988
    address: 0x70
    update_interval: 60s
    pressure:
      name: "Sourdough Pressure"
      id: sourdough_pressure

  # VL53L0X: distance to dough surface (mm)
  - platform: vl53l0x
    name: "Sourdough Distance"
    id: sourdough_distance
    update_interval: 60s
    unit_of_measurement: "mm"
    filters:
      - multiply: 1000
    on_value:
      then:
        - lambda: |-
            float dist = x;
            float baseline = id(baseline_distance);

            // Rise rate: positive = dough rising (distance shrinking)
            if (id(prev_distance) > 0) {
              id(sourdough_rise_rate).publish_state(id(prev_distance) - dist);
            }

            if (baseline > 0) {
              float rise_mm = baseline - dist;

              // Rise percentage relative to initial dough height
              float initial_height = id(jar_depth).state - baseline;
              if (initial_height > 0) {
                id(sourdough_rise_pct).publish_state((rise_mm / initial_height) * 100.0f);
              }

              // Track closest approach (maximum rise)
              if (dist < id(min_distance)) {
                id(min_distance) = dist;
              }

              // Peak: starter falling back after rising at least 10mm,
              // current distance 5mm above the peak (hysteresis against noise)
              if (!id(peak_notified) && rise_mm > 10.0f && dist > id(min_distance) + 5.0f) {
                id(peak_notified) = true;
                id(sourdough_peaked).publish_state(true);
              }
            }

            id(prev_distance) = dist;

  # Derived: rise percentage since feeding
  - platform: template
    name: "Sourdough Rise"
    id: sourdough_rise_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:arrow-expand-up"

  # Derived: rise rate (mm/min, smoothed over 5 readings)
  - platform: template
    name: "Sourdough Rise Rate"
    id: sourdough_rise_rate
    unit_of_measurement: "mm/min"
    accuracy_decimals: 1
    icon: "mdi:trending-up"
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

# ─── Peak detection ──────────────────────────────────────────
binary_sensor:
  - platform: template
    name: "Sourdough Peaked"
    id: sourdough_peaked
    icon: "mdi:flag-checkered"

  # ─── Physical buttons ────────────────────────────────────────
  - platform: gpio
    id: btn_up
    pin:
      number: GPIO37
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 2) % 3;
        - component.update: eink

  - platform: gpio
    id: btn_center
    pin:
      number: GPIO38
      inverted: true
    on_press:
      then:
        - lambda: |-
            if (id(current_page) == 2) {
              // Feed action
              id(baseline_distance) = id(sourdough_distance).state;
              id(min_distance) = id(sourdough_distance).state;
              id(prev_distance) = -1;
              id(peak_notified) = false;
              id(sourdough_peaked).publish_state(false);
              id(sourdough_rise_pct).publish_state(0);
              id(sourdough_rise_rate).publish_state(0);
              ESP_LOGI("menu", "Baseline reset — sourdough fed");
            }
        - component.update: eink

  - platform: gpio
    id: btn_down
    pin:
      number: GPIO39
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 1) % 3;
        - component.update: eink

# ─── Feed button (HA) ────────────────────────────────────────
button:
  - platform: template
    name: "Feed Sourdough"
    icon: "mdi:silverware-spoon"
    on_press:
      then:
        - lambda: |-
            id(baseline_distance) = id(sourdough_distance).state;
            id(min_distance) = id(sourdough_distance).state;
            id(prev_distance) = -1;
            id(peak_notified) = false;
            id(sourdough_peaked).publish_state(false);
            id(sourdough_rise_pct).publish_state(0);
            id(sourdough_rise_rate).publish_state(0);
        - logger.log: "Baseline reset — sourdough fed"

# ─── Display ─────────────────────────────────────────────────
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

display:
  - platform: waveshare_epaper
    id: eink
    cs_pin: GPIO9
    dc_pin: GPIO15
    busy_pin:
      number: GPIO4
      inverted: false
    reset_pin: GPIO0
    model: 1.54inv2
    full_update_every: 1
    update_interval: 60s
    lambda: |-
      int page = id(current_page);

      // Page indicator dots at top-right
      for (int i = 0; i < 3; i++) {
        if (i == page) {
          it.filled_circle(176 + i * 10, 6, 3);
        } else {
          it.circle(176 + i * 10, 6, 3);
        }
      }

      if (page == 0) {
        // ── STATUS ──
        if (!isnan(id(sourdough_temp).state)) {
          it.printf(0, 0, id(font_large), "%.1f°C", id(sourdough_temp).state);
          it.printf(0, 38, id(font_large), "%.0f%% RH", id(sourdough_hum).state);
        } else {
          it.print(0, 0, id(font_small), "Sensors starting...");
        }

        if (id(baseline_distance) > 0) {
          it.printf(0, 86, id(font_xlarge), "%.0f%%", id(sourdough_rise_pct).state);

          if (id(sourdough_peaked).state) {
            it.print(0, 148, id(font_large), "PEAKED!");
          } else if (id(sourdough_rise_rate).state > 0.1) {
            it.printf(0, 156, id(font_small), "Rising %.1f mm/min",
                      id(sourdough_rise_rate).state);
          } else {
            it.print(0, 156, id(font_small), "Waiting...");
          }
        } else {
          it.print(0, 100, id(font_small), "Press Feed to start");
        }

      } else if (page == 1) {
        // ── DETAILS ──
        it.print(0, 0, id(font_small), "DETAILS");
        it.line(0, 22, 200, 22);

        if (!isnan(id(sourdough_distance).state)) {
          it.printf(0, 32, id(font_large), "%.0f mm", id(sourdough_distance).state);
          it.print(0, 66, id(font_small), "Distance to dough");
        }

        if (!isnan(id(sourdough_pressure).state)) {
          it.printf(0, 100, id(font_large), "%.1f", id(sourdough_pressure).state);
          it.print(0, 134, id(font_small), "hPa");
        }

        if (id(baseline_distance) > 0 && !isnan(id(sourdough_rise_rate).state)) {
          it.printf(0, 164, id(font_small), "Rate: %.1f mm/min",
                    id(sourdough_rise_rate).state);
        }

      } else {
        // ── FEED ──
        it.print(0, 0, id(font_small), "FEED");
        it.line(0, 22, 200, 22);

        if (id(baseline_distance) > 0) {
          it.print(0, 40, id(font_small), "Tracking active");
          it.printf(0, 64, id(font_small), "Base: %.0f mm",
                    id(baseline_distance));
          it.printf(0, 88, id(font_small), "Peak: %.0f mm",
                    id(min_distance));
        } else {
          it.print(0, 50, id(font_small), "Not tracking");
        }

        it.filled_rectangle(20, 120, 160, 40);
        it.print(36, 124, id(font_large), COLOR_OFF, "FEED");
        it.print(20, 170, id(font_small), "Press dial to feed");
      }

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 18
  - file: "gfonts://Roboto"
    id: font_large
    size: 32
  - file: "gfonts://Roboto"
    id: font_xlarge
    size: 52
